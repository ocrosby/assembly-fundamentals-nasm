name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Restore lychee cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: >-
            --cache
            --no-progress
            --exclude-path .lycheeignore
            --exclude-file .lycheeignore
            './**/*.md'
          fail: true

  examples-build:
    name: Build and run every example (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install NASM (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Install NASM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nasm binutils

      - name: Build and run every existing example
        shell: bash
        run: |
          set -e
          # Seed input files that the file-I/O examples read from.
          printf "read by NASM\n" > /tmp/nasm-read-file.txt
          printf "copy source content\n" > /tmp/nasm-copy-src.txt

          declare -A expected=(
            [01-exit-zero]=0
            [02-exit-status]=42
            [03-add]=12
            [04-write-char]=0
            [05-read-char]=0
            [06-read-line]=0
            [07-write-line]=0
            [08-echo-loop]=0
            [09-read-file]=0
            [10-write-file]=0
            [11-copy-file]=0
            [12-countdown]=0
            [13-sum-array]=150
            [14-square]=49
            [15-stack-frame]=25
            [16-factorial]=120
            [17-stack-args]=36
            [18-divmod]=32
            [19-struct-ptr]=37
            [20-macros]=42
          )
          # Examples that read from stdin get an empty pipe so they hit
          # EOF immediately and exit 0 without waiting for a TTY.
          declare -A pipe_stdin=(
            [05-read-char]=1
            [06-read-line]=1
            [08-echo-loop]=1
          )
          fail=0
          for dir in "${!expected[@]}"; do
            path="examples/$dir"
            if [ ! -d "$path" ]; then
              printf "SKIP: %s (directory not present)\n" "$dir"
              continue
            fi
            bin=$(echo "$dir" | sed 's/^[0-9][0-9]-//')
            ( cd "$path" && make clean >/dev/null && make all >/dev/null )
            got=0
            if [ -n "${pipe_stdin[$dir]-}" ]; then
              : | "./$path/$bin" >/dev/null || got=$?
            else
              "./$path/$bin" >/dev/null || got=$?
            fi
            want=${expected[$dir]}
            if [ "$got" -eq "$want" ]; then
              printf "OK  : %-20s exit=%d\n" "$dir" "$got"
            else
              printf "FAIL: %-20s exit=%d (want %d)\n" "$dir" "$got" "$want"
              fail=1
            fi
          done
          exit "$fail"
