version: 2
updates:
  # Keep the pinned GitHub Actions SHAs current. Each new PR carries
  # the new SHA and a comment naming the release tag it points at, so
  # the CI supply chain stays fresh without hand-editing.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      # `prefix` alone gives us `chore(deps): bump ...`. Do NOT add
      # `include: "scope"` — Dependabot then appends its own scope
      # to the prefix, producing the double-parens `chore(deps)(deps): bump ...`
      # that #28 and #29 shipped with before this was fixed.
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"
