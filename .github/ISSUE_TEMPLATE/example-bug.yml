name: Example bug
description: An example under examples/NN-slug/ fails to build, fails to run, or returns the wrong exit status.
title: "examples/NN-slug: <what's wrong>"
labels: ["examples"]
body:
  - type: dropdown
    id: example
    attributes:
      label: Which example
      options:
        - examples/01-exit-zero
        - examples/02-exit-status
        - examples/03-add
        - examples/04-write-char
        - examples/05-read-char
        - examples/06-read-line
        - examples/07-write-line
        - examples/08-echo-loop
        - examples/09-read-file
        - examples/10-write-file
        - examples/11-copy-file
        - examples/12-countdown
        - examples/13-sum-array
        - examples/14-square
        - examples/15-stack-frame
        - examples/16-factorial
        - examples/17-stack-args
        - examples/18-divmod
        - examples/19-struct-ptr
        - examples/20-macros
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Intel)
        - macOS (Apple Silicon under Rosetta)
        - Linux (x86-64)
        - Windows (WSL2)
    validations:
      required: true

  - type: input
    id: nasm
    attributes:
      label: NASM version
      description: Output of `nasm -v`.
      placeholder: NASM version 2.16.03 ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands run and their output. Prefer `make`, `make run`, `make clean` from the example directory.
      value: |
        ```bash
        cd examples/NN-slug
        make clean
        make
        make run
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: The exit code or output the example is supposed to produce, per its README.
    validations:
      required: true
